<!DOCTYPE html>
<html>
<head>
<title>My Timesheet</title>
<style>
body{font-family:Arial;margin:30px}
button{padding:10px;margin:5px}
table{border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #999;padding:8px}
</style>
</head>

<body>

<h1>My Personal Timesheet</h1>

<button onclick="clockIn()">Clock In</button>
<button onclick="clockOut()">Clock Out</button>

<h3 id="status"></h3>

<table>
<tr>
<th>Clock In</th>
<th>Clock Out</th>
<th>Hours</th>
</tr>

<tbody id="table"></tbody>

</table>

<script>

let sessions = JSON.parse(localStorage.getItem("sessions")) || [];
let startTime = null;

function save(){
localStorage.setItem("sessions",JSON.stringify(sessions));
}

function render(){

let table = document.getElementById("table");
table.innerHTML="";

sessions.forEach(s=>{
table.innerHTML+=`
<tr>
<td>${s.in}</td>
<td>${s.out}</td>
<td>${s.hours}</td>
</tr>
`;
});

}

function clockIn(){

startTime=new Date();

document.getElementById("status").innerText=
"Clocked in at "+startTime.toLocaleTimeString();

}

function clockOut(){

if(!startTime){
alert("Clock in first");
return;
}

let end=new Date();

let hours=((end-startTime)/1000/60/60).toFixed(2);

sessions.push({
in:startTime.toLocaleTimeString(),
out:end.toLocaleTimeString(),
hours:hours
});

save();
render();

document.getElementById("status").innerText=
"Worked "+hours+" hours";

startTime=null;

}

render();

</script>

</body>
</html>
